services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: dashboard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: psadmin
      POSTGRES_PASSWORD: psadmin123
      POSTGRES_DB: testdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psadmin -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    image: 1raghu/test-repo-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashboard_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://psadmin:psadmin123@db:5432/testdb
      APP_NAME: FastAPI Dashboard
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost", "http://localhost:80", "http://localhost:3000", "http://frontend"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── React Frontend ────────────────────────────────────────────────────────
  frontend:
    image: 1raghu/test-repo-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000
    container_name: dashboard_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
